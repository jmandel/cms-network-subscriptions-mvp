<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Network activity notification overview</title>
  <desc id="desc">A client subscribes to a network activity endpoint, receives a notification, then follows hints to discovery, source query, or source feed subscription without overlapping paths.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2b4a5f"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #2b4a5f; stroke-width: 2; rx: 8; }
      .soft { fill: #eef6f3; stroke: #2b4a5f; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, sans-serif; font-size: 16px; fill: #14212b; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #33434f; }
      .tag-bg { fill: #ffffff; opacity: 0.94; }
      .line { stroke: #2b4a5f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6d7f8b; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="60" y="210" width="180" height="90" class="box"/>
  <text x="150" y="247" text-anchor="middle" class="label">Client app</text>
  <text x="150" y="271" text-anchor="middle" class="small">authorized subscriber</text>

  <rect x="410" y="85" width="220" height="95" class="soft"/>
  <text x="520" y="123" text-anchor="middle" class="label">Network activity</text>
  <text x="520" y="147" text-anchor="middle" class="small">control-plane topic</text>

  <rect x="410" y="335" width="220" height="95" class="box"/>
  <text x="520" y="373" text-anchor="middle" class="label">RLS or network query</text>
  <text x="520" y="397" text-anchor="middle" class="small">may accept opaque handle</text>

  <rect x="790" y="85" width="220" height="90" class="box"/>
  <text x="900" y="122" text-anchor="middle" class="label">Source FHIR endpoint</text>
  <text x="900" y="146" text-anchor="middle" class="small">query or read</text>

  <rect x="790" y="335" width="220" height="100" class="box"/>
  <text x="900" y="373" text-anchor="middle" class="label">Source feed endpoint</text>
  <text x="900" y="397" text-anchor="middle" class="small">US Core Patient Data Feed</text>

  <!-- Middle control-plane exchange. These solid paths use separate upper and lower lanes. -->
  <path d="M240 235 C315 220 330 132 410 132" class="line"/>
  <rect x="280" y="187" width="92" height="22" class="tag-bg"/>
  <text x="290" y="203" class="small">1. subscribe</text>

  <path d="M410 158 C330 170 315 265 240 270" class="line"/>
  <rect x="276" y="286" width="152" height="22" class="tag-bg"/>
  <text x="285" y="302" class="small">2. activity notification</text>

  <!-- Fallback discovery or network query stays in the lower middle lane. -->
  <path d="M240 286 C305 330 340 383 410 383" class="dash"/>
  <rect x="256" y="338" width="205" height="24" class="tag-bg"/>
  <text x="265" y="355" class="small">3a. rediscover or query network</text>

  <path d="M630 383 H790" class="dash"/>
  <rect x="652" y="392" width="116" height="22" class="tag-bg"/>
  <text x="660" y="410" class="small">narrowed result</text>

  <!-- Direct source query uses the top lane and never passes through the network box. -->
  <path d="M150 210 V35 H900 V85" class="dash"/>
  <rect x="430" y="11" width="248" height="22" class="tag-bg"/>
  <text x="438" y="28" class="small">3b. query source or read target URL</text>

  <!-- Source feed subscription uses the bottom lane, separate from RLS results. -->
  <path d="M150 300 V485 H900 V435" class="dash"/>
  <rect x="408" y="490" width="202" height="22" class="tag-bg"/>
  <text x="417" y="507" class="small">3c. subscribe to source feed</text>
</svg>
